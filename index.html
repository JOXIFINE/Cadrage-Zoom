<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Infinite Zoom</title>

<style>

html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;

    /* fond blanc */
    background: white;

    touch-action: none;
    font-family: Arial, sans-serif;
}

#viewer {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
}

#image {

    position: absolute;

    width: 100%;
    height: 100%;

    object-fit: cover;

    transform-origin: center center;

    will-change: transform;

    user-select: none;
    -webkit-user-drag: none;
    pointer-events: none;

    /* zoom beaucoup plus fluide */
    transition: transform 0.04s linear;
}

/* HUD zoom */

#zoom-meter {

    position: absolute;

    bottom: 20px;
    right: 20px;

    padding: 12px 14px;

    background: rgba(255,255,255,0.72);

    backdrop-filter: blur(14px);

    border: 1px solid rgba(0,0,0,0.08);

    border-radius: 16px;

    color: black;

    font-size: 14px;
    letter-spacing: 0.3px;

    z-index: 100;
}

/* Barre */

#zoom-bar {

    width: 150px;
    height: 6px;

    background: rgba(0,0,0,0.08);

    border-radius: 999px;

    overflow: hidden;

    margin-top: 8px;
}

#zoom-fill {

    width: 0%;
    height: 100%;

    background: black;

    border-radius: 999px;

    transition: width 0.05s linear;
}

</style>
</head>

<body>

<div id="viewer">

    <img id="image" src="1.webp" draggable="false">

    <div id="zoom-meter">

        <div id="zoom-text">
            Zoom ×1.00
        </div>

        <div id="zoom-bar">
            <div id="zoom-fill"></div>
        </div>

    </div>

</div>

<script>

const image = document.getElementById("image");

const zoomText = document.getElementById("zoom-text");
const zoomFill = document.getElementById("zoom-fill");

const images = [
    "1.webp",
    "2.webp",
    "3.webp"
];

let current = 0;

/* zoom actuel */
let scale = 1;

/* zoom cible pour fluidité */
let targetScale = 1;

const MAX_ZOOM = 16;
const MIN_ZOOM = 1;

/* Animation ultra fluide */

function animate() {

    /* interpolation smooth */
    scale += (targetScale - scale) * 0.08;

    image.style.transform = `scale(${scale})`;

    zoomText.innerText =
        `Zoom ×${scale.toFixed(2)}`;

    const progress =
        ((scale - MIN_ZOOM) /
        (MAX_ZOOM - MIN_ZOOM)) * 100;

    zoomFill.style.width =
        `${Math.min(progress, 100)}%`;

    /* passage image suivante */

    if (scale >= MAX_ZOOM - 0.1) {

        current =
            (current + 1) % images.length;

        image.src = images[current];

        scale = 1;
        targetScale = 1;
    }

    requestAnimationFrame(animate);
}

animate();

/* Zoom molette desktop */

window.addEventListener("wheel", (e) => {

    e.preventDefault();

    if (e.deltaY < 0) {

        targetScale *= 1.08;

    } else {

        targetScale /= 1.08;
    }

    targetScale =
        Math.max(MIN_ZOOM, targetScale);

}, { passive: false });

/* Pinch mobile */

let lastDistance = null;

window.addEventListener("touchmove", (e) => {

    if (e.touches.length === 2) {

        e.preventDefault();

        const dx =
            e.touches[0].clientX -
            e.touches[1].clientX;

        const dy =
            e.touches[0].clientY -
            e.touches[1].clientY;

        const distance =
            Math.sqrt(dx * dx + dy * dy);

        if (lastDistance) {

            if (distance > lastDistance) {

                targetScale *= 1.025;

            } else {

                targetScale /= 1.025;
            }

            targetScale =
                Math.max(MIN_ZOOM, targetScale);
        }

        lastDistance = distance;
    }

}, { passive: false });

window.addEventListener("touchend", () => {

    lastDistance = null;

});

</script>

</body>
</html>
