<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Infinite Zoom</title>

<style>

html, body {

    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;

    background: black;

    touch-action: none;

    font-family: Arial, sans-serif;
}

#viewer {

    position: relative;

    width: 100vw;
    height: 100vh;

    overflow: hidden;
}

/* DOUBLE BUFFER ultra fluide */

.zoom-image {

    position: absolute;

    width: 100%;
    height: 100%;

    object-fit: cover;

    transform-origin: center center;

    will-change: transform, opacity;

    user-select: none;
    -webkit-user-drag: none;
    pointer-events: none;

    backface-visibility: hidden;

    transition:
        opacity 0.18s ease;
}

.hidden {
    opacity: 0;
}

.visible {
    opacity: 1;
}

/* HUD */

#zoom-meter {

    position: absolute;

    top: 20px;
    right: 20px;

    padding: 12px 14px;

    background: rgba(255,255,255,0.72);

    backdrop-filter: blur(14px);

    border: 1px solid rgba(0,0,0,0.08);

    border-radius: 16px;

    color: black;

    font-size: 14px;

    letter-spacing: 0.3px;

    z-index: 100;
}

/* Barre */

#zoom-bar {

    width: 160px;
    height: 6px;

    background: rgba(0,0,0,0.08);

    border-radius: 999px;

    overflow: hidden;

    margin-top: 8px;
}

#zoom-fill {

    width: 0%;
    height: 100%;

    background: black;

    border-radius: 999px;
}

</style>
</head>

<body>

<div id="viewer">

    <!-- double image -->
    <img id="imgA"
         class="zoom-image visible"
         src="1.webp"
         draggable="false">

    <img id="imgB"
         class="zoom-image hidden"
         draggable="false">

    <!-- HUD -->
    <div id="zoom-meter">

        <div id="zoom-text">
            Zoom ×1.00
        </div>

        <div id="zoom-bar">
            <div id="zoom-fill"></div>
        </div>

    </div>

</div>

<script>

/* ------------------- */
/* CONFIG */
/* ------------------- */

const images = [
    "1.webp",
    "2.webp",
    "3.webp",
    "4.webp",
    "5.webp",
    "6.webp"
];

const MAX_ZOOM = 22;
const MIN_ZOOM = 1;

/* ------------------- */
/* PRELOAD TOTAL */
/* ------------------- */

images.forEach(src => {

    const preload = new Image();
    preload.src = src;

});

/* ------------------- */
/* ELEMENTS */
/* ------------------- */

const imgA = document.getElementById("imgA");
const imgB = document.getElementById("imgB");

const zoomText =
    document.getElementById("zoom-text");

const zoomFill =
    document.getElementById("zoom-fill");

let activeImg = imgA;
let nextImg = imgB;

/* ------------------- */
/* STATE */
/* ------------------- */

let current = 0;

let scale = 1;
let targetScale = 1;

let transitioning = false;

/* ------------------- */
/* LOOP */
/* ------------------- */

function animate() {

    /* interpolation très fluide */

    scale += (targetScale - scale) * 0.045;

    activeImg.style.transform =
        `scale(${scale})`;

    /* HUD */

    zoomText.innerText =
        `Zoom ×${scale.toFixed(2)}`;

    const progress =
        ((scale - MIN_ZOOM) /
        (MAX_ZOOM - MIN_ZOOM)) * 100;

    zoomFill.style.width =
        `${Math.min(progress, 100)}%`;

    /* transition image */

    if (
        scale >= MAX_ZOOM &&
        !transitioning
    ) {

        transitionToNext();
    }

    requestAnimationFrame(animate);
}

requestAnimationFrame(animate);

/* ------------------- */
/* TRANSITION */
/* ------------------- */

function transitionToNext() {

    transitioning = true;

    current =
        (current + 1) % images.length;

    /* image suivante préchargée */

    nextImg.src = images[current];

    /* reset scale */

    scale = 1;
    targetScale = 1;

    nextImg.style.transform =
        `scale(1)`;

    /* crossfade */

    nextImg.classList.remove("hidden");
    nextImg.classList.add("visible");

    activeImg.classList.remove("visible");
    activeImg.classList.add("hidden");

    /* swap */

    const temp = activeImg;

    activeImg = nextImg;
    nextImg = temp;

    setTimeout(() => {

        transitioning = false;

    }, 180);
}

/* ------------------- */
/* DESKTOP */
/* ------------------- */

window.addEventListener("wheel", (e) => {

    e.preventDefault();

    const zoomIntensity = 1.045;

    if (e.deltaY < 0) {

        targetScale *= zoomIntensity;

    } else {

        targetScale /= zoomIntensity;
    }

    targetScale =
        Math.max(MIN_ZOOM, targetScale);

}, { passive: false });

/* ------------------- */
/* MOBILE PINCH */
/* ------------------- */

let lastDistance = null;

window.addEventListener("touchmove", (e) => {

    if (e.touches.length === 2) {

        e.preventDefault();

        const dx =
            e.touches[0].clientX -
            e.touches[1].clientX;

        const dy =
            e.touches[0].clientY -
            e.touches[1].clientY;

        const distance =
            Math.sqrt(dx * dx + dy * dy);

        if (lastDistance) {

            const delta =
                distance - lastDistance;

            targetScale *=
                1 + (delta * 0.0025);

            targetScale =
                Math.max(
                    MIN_ZOOM,
                    targetScale
                );
        }

        lastDistance = distance;
    }

}, { passive: false });

window.addEventListener("touchend", () => {

    lastDistance = null;

});

</script>

</body>
</html>
